<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<meta charset="UTF-8">

  <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">


<title>Product Banner Generator</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.toolbar{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

input{
    width:300px;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#6F4E37;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#5a3f2d;
}

/* Instagram Post */

#banner{
    width:1080px;
    height:1080px;
    background-image: url("djbackground.jpg");
    //background-color: #C68642;
    position:relative;
    overflow:hidden;
    border:1px solid #ccc;
}
/*Order*/
.order-header{
    position:absolute;
    bottom:380px;
    left:800px;
    width:200px;
    height: 30px;
    background:#d03d1d;
    border-radius:30px;
    text-align:center;
    padding:20px;
    
    
 /* top shadow */
    box-shadow: 0 -8px 12px rgba(0,0,0,.2);

}

.ordernow{
    font-family:'DM Sans',sans-serif;
    font-size:30px;
    font-weight:bold;
    color:white;
}


/* Product Header */

.product-header{
    position:absolute;
    top:30px;
    left:30px;
    width:700px;
    background:#f6c0a6;
    color:white;
    border-radius:30px;
    text-align:center;
    padding:20px;
    
    
 /* top shadow */
    box-shadow: 0 -8px 12px rgba(0,0,0,.2);

}

.product-code-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px; /* Space between line and text */
    margin-top:10px;
}


.product-name{
    font-family:'DM Sans',sans-serif;
    font-size:40px;
    font-weight:bold;
    color:#b93028;
}

.product-code{
    font-family:'DM Sans',sans-serif;
    font-size:22px;
    margin-top:8px;
    color:#b93028;
}

.code-line{
    width:110px;
    height:2px;
    background:linear-gradient(to right,#c68b3d,#e0b46d,#c68b3d);
}

/* Product Image Placeholder */

.product-image{
    position:absolute;
    left:50px;
    bottom:210px;
    width:650px;
    height:600px;
    border: 2px solid #c68b3d;
    padding: 10px;
    border-radius: 30px;
    display:flex;
    justify-content:center;
    align-items:center;
   }

/* Price Card */

.price-card{
    position:absolute;
    right:10px;
    top:210px;
    width:280px;
    background: #f6c0a6;
    padding:30px;
    transform:rotate(-5deg);
    
/* top shadow */
    box-shadow: 0 -8px 12px rgba(0,0,0,.2);

}

.price-card p{
    text-align:center;
    font-size:28px;
    font-family:'DM Sans',sans-serif;
    color:#98160e;
}



.pin{
    position:absolute;
    top:-35px;
    left:50%;
    transform:translateX(-50%);
    width:70px;
    z-index:10;
}

.logo{
    position:absolute;
    right:940px;
    bottom:915px;
    width:105px;
    height:105px;
    background-image:url("djlogo.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    border: 2px solid #0f5b60;
    padding: 10px;
    border-radius: 25px;

}



</style>
</head>

<body>

<div class="container">

  <div class="toolbar">

    <input
        type="text"
        id="itemCode"
        placeholder="Enter Item Code">

    <button onclick="generateBanner()">
        Generate
    </button>

    <button onclick="downloadBanner()">
        Download PNG
    </button>

</div>

    <div id="banner">

        <div class="product-header">
            <div class="product-name" id="productName">
                PRODUCT NAME
            </div>
	    <div class="product-code-row">
            <div class="code-line"></div>     
            <div class="product-code" id="productCode">
                ITEM CODE
            </div>
            <div class="code-line"></div>
	</div>
        </div>

    <img
    id="productImage"
    class="product-image"
    src="">
    
    
     <div class="price-card">

    
	<img
        id="pin"
        class="pin"
        src="pinned.png">

    <p id="downPayment"></p>
    <p id="weeklyPayment"></p>
    <p id="term"></p>
    <p id="cash"></p>
    </div>

<div class="order-header">
            <div class="ordernow">
                ORDER NOW
            </div>
</div>

<div class="logo">
</div>


</div>

<script>

async function generateBanner() {
     
   const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxh8dYxbv9QlBn7rWNM3UXNtOjppABNLT-zxUr0otcdNIY6ZWnXmIHHaEuVUTWdYQcb/exec";
    const itemCode =
        document.getElementById("itemCode").value;

    const response =
        await fetch(WEB_APP_URL + "?itemCode=" + itemCode);

    const data =
        await response.json();
    console.log(data);
    document.getElementById("productName").innerText =
    data.itemName;

document.getElementById("productCode").innerText =
    data.itemCode;

document.getElementById("productImage").src =
    data.imageUrl;

document.getElementById("downPayment").innerHTML =
    "<b>DOWN:</b> " + "<b>" + data.downPayment + "<b>";

document.getElementById("weeklyPayment").innerText =
    data.weeklyPayment + " / weekly";

document.getElementById("term").innerText =
    data.term + " weeks to pay";

document.getElementById("cash").innerText =
    "Cash: " + data.cash;
}

    link.download =
        itemCode + ".png";

    link.href =
        canvas.toDataURL("image/png");

    link.click();
}*/
</script>

</body>
</html>
